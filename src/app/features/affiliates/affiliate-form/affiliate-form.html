<div class="mb-4">
  <a routerLink="/affiliates" class="text-white-50 text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i> Volver a Afiliados
  </a>
  <h2 class="mt-2">{{ isEditMode() ? 'Editar afiliado' : 'Nuevo afiliado' }}</h2>
</div>

<form [formGroup]="form" (ngSubmit)="submit()" novalidate class="glassmorphism p-4 p-md-5">
  <div class="row g-3">
    <div class="col-md-6">
      <label class="form-label text-white-50">Tipo de documento</label>
      <select class="form-select" formControlName="documentType">
        @for (type of documentTypes; track type) {
          <option [value]="type">{{ type }}</option>
        }
      </select>
    </div>
    <div class="col-md-6">
      <label class="form-label text-white-50">Número de documento</label>
      <input type="text" class="form-control" formControlName="documentNumber" />
    </div>

    <div class="col-md-6">
      <label class="form-label text-white-50">Nombre</label>
      <input
        type="text"
        class="form-control"
        formControlName="firstName"
        [class.is-invalid]="form.controls.firstName.invalid && form.controls.firstName.touched"
      />
    </div>
    <div class="col-md-6">
      <label class="form-label text-white-50">Apellido</label>
      <input
        type="text"
        class="form-control"
        formControlName="lastName"
        [class.is-invalid]="form.controls.lastName.invalid && form.controls.lastName.touched"
      />
    </div>

    @if (!isEditMode()) {
      <div class="col-md-6">
        <label class="form-label text-white-50">Fecha de nacimiento</label>
        <input
          type="date"
          class="form-control"
          formControlName="birthDate"
          [class.is-invalid]="form.controls.birthDate.invalid && form.controls.birthDate.touched"
        />
      </div>
    }

    <div class="col-md-6">
      <label class="form-label text-white-50">Email</label>
      <input
        type="email"
        class="form-control"
        formControlName="email"
        [class.is-invalid]="form.controls.email.invalid && form.controls.email.touched"
      />
    </div>
    <div class="col-md-6">
      <label class="form-label text-white-50">Teléfono</label>
      <input type="text" class="form-control" formControlName="phone" />
    </div>

    <div class="col-12">
      <label class="form-label text-white-50">Dirección</label>
      <input type="text" class="form-control" formControlName="address" />
    </div>

    <div class="col-md-6">
      <label class="form-label text-white-50">Contacto de emergencia</label>
      <input type="text" class="form-control" formControlName="emergencyContact" />
    </div>
    <div class="col-md-6">
      <label class="form-label text-white-50">Teléfono de emergencia</label>
      <input type="text" class="form-control" formControlName="emergencyPhone" />
    </div>

    <div class="col-12">
      <label class="form-label text-white-50">Notas</label>
      <textarea class="form-control" rows="3" formControlName="notes"></textarea>
    </div>
  </div>

  <div class="d-flex justify-content-end gap-2 mt-4">
    <a routerLink="/affiliates" class="btn btn-outline-light">Cancelar</a>
    <button type="submit" class="btn bg-electric-blue fw-semibold" [disabled]="isSubmitting()">
      @if (isSubmitting()) {
        <span class="spinner-border spinner-border-sm me-2"></span>
      }
      Guardar
    </button>
  </div>
</form>
